set -g default-terminal "tmux-256color"
set -as terminal-features ",*:RGB"

set -g mouse on

unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# set vi-mode
set-window-option -g mode-keys vi
# keybindings
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# status
set -g status-position top
set -g status-justify absolute-centre
set -g status-style "bg=default"
set -g window-status-current-style "fg=black bg=white"
set -g status-interval 5
set -g status-left "#S"
set -g status-right ""

# windows
bind -r n next-window
bind -r p previous-window
bind v split-window -h -c "#{pane_current_path}"
bind h split-window -v -c "#{pane_current_path}"

# panes
set -g pane-border-lines double

# scripts
bind r source-file "~/.config/tmux/tmux.conf"
bind f run "tmux neww ~/.config/tmux/scripts/tmux-session-dispensary.sh"
bind g run "~/.config/tmux/scripts/open-github.sh"
bind E show-environment -g

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
# set -g @plugin 'tmux-plugins/tmux-resurrect'
# set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'aserowy/tmux.nvim'

# set -g @resurrect-strategy-vim 'session'
# set -g @resurrect-strategy-nvim 'session'
# set -g @continuum-restore 'on'

if "test ! -d ~/.config/tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm"

run '~/.config/tmux/plugins/tpm/bin/install_plugins'
run '~/.config/tmux/plugins/tpm/bin/update_plugins all'
run '~/.config/tmux/plugins/tpm/tpm'
